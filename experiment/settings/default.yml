window:
  size: [1920, 1080]
  pos: [0, 0]
  color: '#646464'
  fullscr: True
  winType: pyglet
  screen: 1
  viewPos: [0, 0]
  allowStencil: True

monitor:
  name: Spinoza_7T
  width: 70.9      # width of monitor (in cm)
  distance: 196    # distance of participant from monitor (in cm)
  gamma: 1.0

design:
  n_trials: 60          # must be divisible by 5 (3:2 distractor:absent ratio)
                        # 36 distractor-present (3 ranks × 12 combos) + 24 absent
  feedback_probability: 0.5   # fraction of scanning trials showing points feedback
  n_runs: 6
  n_bar_positions: 10   # positions per direction; 10 horiz + 10 vert = 20 total → 60/20 = 3 reps each

mri:
  TR: 1.6
  TA: 2.0
  sync: t
  n_dummy_scans: 5

experiment:
  size_stimuli: 1.5       # size of search items (visual degrees)
  size_fixation: 0.25     # size of fixation dot (visual degrees)
  eccentricity_stimulus: 4.0  # eccentricity of search array (visual degrees)
  stimulus_shift: 0.0    # shift entire display downward (visual degrees)
  keys: ["y", "b"]        # [no-dot, dot] — Spinoza scanner keys
  # keys: ["up", "left"]  # [no-dot, dot] — behavioural lab keys

durations:
  trial_start: 0.5        # brief fixation before pre-target period
  trial_wait: 0.5         # pre-target fixation (cue period)
  target: 1.75            # search array on-screen; 1750 ms matches osexp timeout
  feedback: 1.0           # feedback / blank screen after iti1
  iti1: [1.0, 1.5, 2.0]  # first ITI segment (before feedback)
  iti2: [1.0, 1.5, 2.0]  # second ITI segment (after feedback)
  blank: 20.0             # leading/trailing fixation baseline (s)

various:
  text_width: 20
  text_height: 0.5
  text_color: [1, 1, 1]
  eyemovements_alert: True
  gaze_threshold_deg: 1

# eyetracker: True        # uncomment to enable Eyelink
